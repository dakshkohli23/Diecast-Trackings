name: Deploy PreTrack to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject secrets into config/config.js
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
          SUPER_ADMIN_EMAIL:            ${{ secrets.SUPER_ADMIN_EMAIL }}
          SUPABASE_URL:                 ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:            ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          sed -i "s|__FIREBASE_API_KEY__|${FIREBASE_API_KEY}|g"                         config/config.js
          sed -i "s|__FIREBASE_AUTH_DOMAIN__|${FIREBASE_AUTH_DOMAIN}|g"                 config/config.js
          sed -i "s|__FIREBASE_PROJECT_ID__|${FIREBASE_PROJECT_ID}|g"                   config/config.js
          sed -i "s|__FIREBASE_STORAGE_BUCKET__|${FIREBASE_STORAGE_BUCKET}|g"           config/config.js
          sed -i "s|__FIREBASE_MESSAGING_SENDER_ID__|${FIREBASE_MESSAGING_SENDER_ID}|g" config/config.js
          sed -i "s|__FIREBASE_APP_ID__|${FIREBASE_APP_ID}|g"                           config/config.js
          sed -i "s|__SUPER_ADMIN_EMAIL__|${SUPER_ADMIN_EMAIL}|g"                       config/config.js
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g"                                 config/config.js
          sed -i "s|__SUPABASE_ANON_KEY__|${SUPABASE_ANON_KEY}|g"                       config/config.js
          echo "✓ Secrets injected"

      - name: Verify injection
        run: |
          if grep -q "__FIREBASE_API_KEY__" config/config.js; then
            echo "FAILED: __FIREBASE_API_KEY__ still present — check GitHub Secrets are set"
            exit 1
          fi
          echo "✓ config/config.js injected successfully"
          grep "apiKey" config/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
